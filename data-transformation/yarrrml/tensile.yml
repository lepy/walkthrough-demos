prefixes:
  rr: http://www.w3.org/ns/r2rml#
  foaf: http://xmlns.com/foaf/0.1/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  dc: http://purl.org/dc/elements/1.1/
  rev: http://purl.org/stuff/rev#
  gtfs: http://vocab.gtfs.org/terms#
  geo: http://www.w3.org/2003/01/geo/wgs84_pos#
  schema: http://schema.org/
  dct: http://purl.org/dc/terms/
  rml: http://semweb.mmlab.be/ns/rml#
  ql: http://semweb.mmlab.be/ns/ql#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  ex: http://example.com/
  
  tensile_strength: https://w3id.org/pmd/co/PMD_0080154
  has_quality: http://purl.obolibrary.org/obo/RO_0000086
  has_role: http://purl.obolibrary.org/obo/RO_0000087
  has_value_specification: http://purl.obolibrary.org/obo/OBI_0001938
  specifies_value_of: http://purl.obolibrary.org/obo/OBI_0001927
  has_participant: http://purl.obolibrary.org/obo/RO_0000057
  specified_output_of: http://purl.obolibrary.org/obo/OBI_0000312
  realizes: http://purl.obolibrary.org/obo/BFO_0000055
  has_specified_numeric_value: http://purl.obolibrary.org/obo/OBI_0001937
  has_measurement_unit_label: http://purl.obolibrary.org/obo/IAO_0000039
  measurement_datum: http://purl.obolibrary.org/obo/IAO_0000109

mappings:
  object:
    sources:
      - [tensile.csv~csv]
    s: ex:obj_$(obj_id)
    po:
      - [has_quality:, ex:qual_$(obj_id)~iri]
      - [has_role:, ex:role_$(obj_id)~iri]

  quality:
    sources:
      - [tensile.csv~csv]
    s: ex:qual_$(obj_id)
    po:
      - [a, tensile_strength:]

  process:
    sources:
      - [tensile.csv~csv]
    s: ex:proc_$(obj_id)
    po:
      - [has_participant:, ex:obj_$(obj_id)~iri]
      - [realizes:, ex:role_$(obj_id)~iri]
  
  value_specification:
    sources:
      - [tensile.csv~csv]
    s: ex:spec_$(obj_id)
    po:
      - [specifies_value_of:, ex:qual_$(obj_id)~iri]
      - [has_measurement_unit_label:, $(unit)~iri]
      - [has_specified_numeric_value:, $(value)]
      
  datum:
    sources:
      - [tensile.csv~csv]
    s: ex:datum_$(obj_id)
    po:
      - [specified_output_of:, ex:proc_$(obj_id)~iri]
      - [has_value_specification:, ex:spec_$(obj_id)~iri]
      - [a, measurement_datum:]
   
